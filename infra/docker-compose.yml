services:
  db:
    image: postgres:16-alpine
    container_name: lentik_db
    environment:
      POSTGRES_DB: lentik
      POSTGRES_USER: lentik
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - lentik_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lentik -d lentik"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: lentik_api
    environment:
      DATABASE_URL: postgresql+asyncpg://lentik:${POSTGRES_PASSWORD}@db:5432/lentik
      UPLOAD_DIR: /uploads
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      IS_PRODUCTION: ${IS_PRODUCTION:-false}
      STRICT_MIGRATIONS: ${STRICT_MIGRATIONS:-false}
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    volumes:
      - ../services/api:/app
      - ../services/cloud/uploads:/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../services/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://api.lentik.app}
        NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE:-wss://api.lentik.app}
    container_name: lentik_web
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ../services/web:/app
      - /app/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    depends_on:
      - api

volumes:
  lentik_pgdata:
