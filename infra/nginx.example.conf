# Пример reverse-proxy для прода (P5).
# Отдаёт security-заголовки для HTML-страниц фронта НАСТОЯЩИМИ заголовками
# (не <meta>), терминирует TLS и проксирует API + WebSocket.
#
# Подставьте свой домен и пути к статике/сертификатам.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name lentik.example.com;

    ssl_certificate     /etc/letsencrypt/live/lentik.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lentik.example.com/privkey.pem;

    # ── Security-заголовки для всех ответов фронта ───────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), camera=()" always;
    # CSP: перенесена из <meta> в реальный заголовок. Подставьте origin API/WS.
    # frame-ancestors здесь работает (в <meta> игнорируется браузером).
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self' 'unsafe-inline'; \
        style-src 'self' 'unsafe-inline'; \
        img-src 'self' data: https://api.lentik.example.com; \
        media-src 'self' https://api.lentik.example.com; \
        connect-src 'self' https://api.lentik.example.com wss://api.lentik.example.com; \
        object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Статика Next.js (output: export)
    root /srv/lentik/web;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# API + WebSocket (отдельный поддомен)
server {
    listen 443 ssl http2;
    server_name api.lentik.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.lentik.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lentik.example.com/privkey.pem;

    # Заголовки безопасности API ставит само приложение (main.py middleware);
    # здесь дублировать не обязательно.

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (чаты, presence)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
